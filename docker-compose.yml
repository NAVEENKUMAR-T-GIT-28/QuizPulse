services:

  mongodb:
    image: mongo:7.0
    container_name: quizpulse-mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongodb-data:/data/db

    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - quizpulse-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        ENABLE_PUPPETEER: "false"
    image: quizpulse-server

    container_name: quizpulse-server

    ports:
      - "5000:5000"

    env_file:
      - ./server/.env
    environment:
      - ENABLE_PUPPETEER=false
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true

    volumes:
      - quizpulse-server:/app/public/exports

    depends_on:
      - mongodb

    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - quizpulse-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: quizpulse-client

    container_name: quizpulse-client

    ports:
      - "5173:5173"

    volumes:
      - quizpulse-client:/usr/share/nginx/html

    depends_on:
      - server

    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - quizpulse-network

networks:
  quizpulse-network:
    driver: bridge

volumes:
  mongodb-data:
    name: MongoDB

  quizpulse-server:
    name: quizpulse-server

  quizpulse-client:
    name: quizpulse-client